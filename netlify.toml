[build]
  command = "npm run build:client"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "20"
# Set this in Netlify UI (or here) to point the frontend at your backend.
# VITE_API_BASE_URL = "https://your-backend.onrender.com"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
