[build]
  command = "npm run build:client"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "20"
  VITE_WS_BASE_URL = "https://srpizzza.onrender.com"
# HTTP API requests stay same-origin and use the redirects below.
# WebSockets still connect directly to the Render backend.

[[redirects]]
  from = "/api/*"
  to = "https://srpizzza.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
